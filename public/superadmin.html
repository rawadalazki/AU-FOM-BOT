<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UniBot Hub - Super Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background-color: #2c3e50; }
    .navbar-brand { color: #fff; font-weight: bold; }
    .nav-link { color: #ecf0f1; }
    .nav-link:hover { color: #fff; }
    .container { margin-top: 2rem; }
    .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      <i class="bi bi-robot me-2"></i>UniBot Hub
    </a>
    <div class="d-flex align-items-center">
      <span class="text-light me-3" id="currentUserDisplay"></span>
      <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
      <button class="btn btn-danger btn-sm" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Admin Management</h2>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addAdminModal">
      <i class="bi bi-person-plus me-1"></i> Add Admin
    </button>
  </div>

  <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Last Login</th>
            <th>Created</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="adminsTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Admin Modal -->
<div class="modal fade" id="addAdminModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create New Admin</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="addAdminError" class="text-danger mb-2 d-none"></div>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="newAdminUsername" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="newAdminPassword" required>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="saveAdminBtn">Create Admin</button>
      </div>
    </div>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="modal fade" id="resetPasswordModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Reset Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="resetPasswordError" class="text-danger mb-2 d-none"></div>
        <p>Resetting password for: <strong id="resetUsernameDisplay"></strong></p>
        <input type="hidden" id="resetAdminId">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control" id="resetAdminPassword" required>
        </div>
        <div class="form-text text-warning">This will invalidate all current sessions for this user.</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmResetBtn">Reset Password</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/superadmin.js"></script>
</body>
</html>
