<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UniBot Hub - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      max-width: 400px;
      width: 100%;
      padding: 2rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .logo-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<div class="login-container text-center">
  <img src="/logo.png" alt="UniBot Hub Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/80?text=UBH'">
  <h3 class="mb-4">UniBot Hub Admin</h3>
  
  <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

  <form id="loginForm">
    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="username" placeholder="Username" required>
      <label for="username">Username</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="password" placeholder="Password" required>
      <label for="password">Password</label>
    </div>
    <button class="btn btn-primary w-100 py-2" type="submit" id="loginBtn">Login</button>
  </form>
</div>

<script src="/js/login.js"></script>
</body>
</html>
