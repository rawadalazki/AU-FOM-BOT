version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://fombot:fombot_password@postgres:5432/fombot
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: fombot-uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:3000}
      WEBHOOK_SECRET: dev-secret-change-in-production
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
      CACHE_TTL_SECONDS: 300
      BACKUP_ENABLED: "false"
      BACKUP_CRON: "0 3 * * *"
      BACKUP_RETENTION: 7
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fombot
      POSTGRES_PASSWORD: fombot_password
      POSTGRES_DB: fombot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fombot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # One-time setup: creates the S3 bucket in MinIO
  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/fombot-uploads;
      mc anonymous set download local/fombot-uploads;
      echo 'Bucket created successfully';
      "

volumes:
  pgdata:
  miniodata:
  redisdata:
